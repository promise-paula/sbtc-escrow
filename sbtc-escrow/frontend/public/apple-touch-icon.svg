<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#E8850A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  
  <!-- Shield shape -->
  <path d="M90 24L32 48v48c0 42 28 76 58 84 30-8 58-42 58-84V48L90 24z" 
        fill="url(#shield)"/>
  
  <!-- Inner highlight -->
  <path d="M90 32L42 52v44c0 35 23 64 48 72V32z" 
        fill="rgba(255,255,255,0.12)"/>
  
  <!-- Lock body -->
  <rect x="62" y="85" width="56" height="50" rx="8" fill="#fff"/>
  
  <!-- Lock shackle -->
  <path d="M70 85v-16c0-11 9-20 20-20s20 9 20 20v16" 
        fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="90" cy="104" r="8" fill="#F7931A"/>
  <path d="M90 108l-4 14h8l-4-14z" fill="#F7931A"/>
</svg>
